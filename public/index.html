<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>天气查询API - 演示页面</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			body {
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
				background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
				min-height: 100vh;
				padding: 20px;
			}

			.container {
				max-width: 1200px;
				margin: 0 auto;
			}

			h1 {
				color: white;
				text-align: center;
				margin-bottom: 30px;
				font-size: 2.5em;
				text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
			}

			.card {
				background: white;
				border-radius: 12px;
				padding: 25px;
				margin-bottom: 20px;
				box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
			}

			.card h2 {
				color: #667eea;
				margin-bottom: 15px;
				font-size: 1.5em;
			}

			.input-group {
				display: flex;
				gap: 10px;
				margin-bottom: 15px;
				flex-wrap: wrap;
			}

			input[type='text'],
			input[type='number'] {
				flex: 1;
				min-width: 200px;
				padding: 12px 15px;
				border: 2px solid #e0e0e0;
				border-radius: 8px;
				font-size: 16px;
				transition: border-color 0.3s;
			}

			input[type='text']:focus,
			input[type='number']:focus {
				outline: none;
				border-color: #667eea;
			}

			button {
				padding: 12px 30px;
				background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
				color: white;
				border: none;
				border-radius: 8px;
				font-size: 16px;
				font-weight: 600;
				cursor: pointer;
				transition:
					transform 0.2s,
					box-shadow 0.2s;
			}

			button:hover {
				transform: translateY(-2px);
				box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
			}

			button:active {
				transform: translateY(0);
			}

			.quick-cities {
				display: flex;
				gap: 10px;
				flex-wrap: wrap;
				margin-bottom: 15px;
			}

			.city-btn {
				padding: 8px 16px;
				background: #f0f0f0;
				color: #333;
				border: 2px solid #e0e0e0;
				border-radius: 20px;
				font-size: 14px;
				cursor: pointer;
				transition: all 0.2s;
			}

			.city-btn:hover {
				background: #667eea;
				color: white;
				border-color: #667eea;
			}

			.result {
				background: #f8f9fa;
				border-radius: 8px;
				padding: 20px;
				margin-top: 15px;
				max-height: 500px;
				overflow-y: auto;
			}

			.result pre {
				white-space: pre-wrap;
				word-wrap: break-word;
				font-family: 'Courier New', monospace;
				font-size: 14px;
				line-height: 1.6;
			}

			.weather-display {
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
				gap: 15px;
				margin-top: 15px;
			}

			.weather-card {
				background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
				color: white;
				padding: 20px;
				border-radius: 12px;
				text-align: center;
			}

			.weather-card h3 {
				margin-bottom: 10px;
				font-size: 1.3em;
			}

			.weather-card .temp {
				font-size: 3em;
				font-weight: bold;
				margin: 10px 0;
			}

			.weather-card img {
				width: 64px;
				height: 64px;
				margin: 10px 0;
			}

			.weather-info {
				display: flex;
				justify-content: space-around;
				margin-top: 15px;
				font-size: 0.9em;
			}

			.loading {
				text-align: center;
				color: #667eea;
				font-weight: 600;
				padding: 20px;
			}

			.error {
				background: #fee;
				color: #c33;
				padding: 15px;
				border-radius: 8px;
				border-left: 4px solid #c33;
			}

			.stats-grid {
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
				gap: 15px;
				margin-top: 15px;
			}

			.stat-item {
				background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
				padding: 15px;
				border-radius: 8px;
				text-align: center;
			}

			.stat-item .city {
				font-size: 1.2em;
				font-weight: bold;
				margin-bottom: 5px;
			}

			.stat-item .count {
				font-size: 2em;
				font-weight: bold;
			}

			.log-table {
				width: 100%;
				border-collapse: collapse;
				margin-top: 15px;
			}

			.log-table th,
			.log-table td {
				padding: 12px;
				text-align: left;
				border-bottom: 1px solid #e0e0e0;
			}

			.log-table th {
				background: #667eea;
				color: white;
				font-weight: 600;
			}

			.log-table tr:hover {
				background: #f8f9fa;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<h1>🌤️ 天气查询API演示</h1>

			<!-- 天气查询 -->
			<div class="card">
				<h2>🌍 查询天气</h2>
				<div class="quick-cities">
					<button class="city-btn" onclick="quickSearch('Beijing')">北京</button>
					<button class="city-btn" onclick="quickSearch('Shanghai')">上海</button>
					<button class="city-btn" onclick="quickSearch('Guangzhou')">广州</button>
					<button class="city-btn" onclick="quickSearch('Shenzhen')">深圳</button>
					<button class="city-btn" onclick="quickSearch('Tokyo')">东京</button>
					<button class="city-btn" onclick="quickSearch('London')">伦敦</button>
					<button class="city-btn" onclick="quickSearch('NewYork')">纽约</button>
					<button class="city-btn" onclick="quickSearch('Paris')">巴黎</button>
				</div>
				<div class="input-group">
					<input type="text" id="cityInput" placeholder="输入城市名称（中文或英文）" value="Beijing" />
					<button onclick="searchWeather()">🔍 查询天气</button>
				</div>
				<div id="weatherResult"></div>
			</div>

			<!-- 访问统计 -->
			<div class="card">
				<h2>📊 访问统计</h2>
				<button onclick="loadStats()">📈 查看统计数据</button>
				<div id="statsResult"></div>
			</div>

			<!-- 访问日志 -->
			<div class="card">
				<h2>📝 访问日志</h2>
				<div class="input-group">
					<input type="number" id="limitInput" placeholder="显示条数" value="20" min="1" max="100" />
					<button onclick="loadLogs()">📋 查看日志</button>
				</div>
				<div id="logsResult"></div>
			</div>
		</div>

		<script>
			const API_BASE = window.location.origin;

			// 快速搜索
			function quickSearch(city) {
				document.getElementById('cityInput').value = city;
				searchWeather();
			}

			// 查询天气
			async function searchWeather() {
				const city = document.getElementById('cityInput').value.trim();
				if (!city) {
					alert('请输入城市名称');
					return;
				}

				const resultDiv = document.getElementById('weatherResult');
				resultDiv.innerHTML = '<div class="loading">🔄 正在查询天气信息...</div>';

				try {
					const response = await fetch(`${API_BASE}/weather?city=${encodeURIComponent(city)}`);
					const data = await response.json();

					if (data.error) {
						resultDiv.innerHTML = `<div class="error">❌ ${data.error}</div>`;
						return;
					}

					resultDiv.innerHTML = `
                    <div class="weather-display">
                        <div class="weather-card">
                            <h3>${data.location}</h3>
                            <img src="${data.icon}" alt="${data.description}">
                            <div class="temp">${data.temperature}°C</div>
                            <div>${data.description}</div>
                            <div class="weather-info">
                                <div>💧 湿度: ${data.humidity}%</div>
                                <div>💨 风速: ${data.windSpeed} km/h</div>
                            </div>
                        </div>
                    </div>
                `;
				} catch (error) {
					resultDiv.innerHTML = `<div class="error">❌ 请求失败: ${error.message}</div>`;
				}
			}

			// 加载统计数据
			async function loadStats() {
				const resultDiv = document.getElementById('statsResult');
				resultDiv.innerHTML = '<div class="loading">🔄 正在加载统计数据...</div>';

				try {
					const response = await fetch(`${API_BASE}/stats`);
					const data = await response.json();

					if (data.error) {
						resultDiv.innerHTML = `<div class="error">❌ ${data.error}</div>`;
						return;
					}

					if (!data.stats || data.stats.length === 0) {
						resultDiv.innerHTML = '<div class="result">暂无统计数据</div>';
						return;
					}

					const statsHtml = data.stats
						.map(
							(stat) => `
                    <div class="stat-item">
                        <div class="city">${stat.city}</div>
                        <div class="count">${stat.count}</div>
                        <div>次查询</div>
                    </div>
                `,
						)
						.join('');

					resultDiv.innerHTML = `<div class="stats-grid">${statsHtml}</div>`;
				} catch (error) {
					resultDiv.innerHTML = `<div class="error">❌ 请求失败: ${error.message}</div>`;
				}
			}

			// 加载访问日志
			async function loadLogs() {
				const limit = document.getElementById('limitInput').value || 20;
				const resultDiv = document.getElementById('logsResult');
				resultDiv.innerHTML = '<div class="loading">🔄 正在加载访问日志...</div>';

				try {
					const response = await fetch(`${API_BASE}/logs?limit=${limit}`);
					const data = await response.json();

					if (data.error) {
						resultDiv.innerHTML = `<div class="error">❌ ${data.error}</div>`;
						return;
					}

					if (!data.logs || data.logs.length === 0) {
						resultDiv.innerHTML = '<div class="result">暂无访问日志</div>';
						return;
					}

					const logsHtml = `
                    <div class="result">
                        <p><strong>共 ${data.total} 条记录</strong></p>
                        <table class="log-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>城市</th>
                                    <th>位置</th>
                                    <th>温度</th>
                                    <th>天气</th>
                                    <th>查询时间</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${data.logs
																	.map(
																		(log) => `
                                    <tr>
                                        <td>${log.id}</td>
                                        <td><strong>${log.city}</strong></td>
                                        <td>${log.location}</td>
                                        <td>${log.temperature}°C</td>
                                        <td>${log.description}</td>
                                        <td>${log.query_time}</td>
                                    </tr>
                                `,
																	)
																	.join('')}
                            </tbody>
                        </table>
                    </div>
                `;

					resultDiv.innerHTML = logsHtml;
				} catch (error) {
					resultDiv.innerHTML = `<div class="error">❌ 请求失败: ${error.message}</div>`;
				}
			}

			// 页面加载时自动查询北京天气
			window.addEventListener('load', () => {
				searchWeather();
			});
		</script>
	</body>
</html>
